    <script>
        // ==================== 计发月数表（从Excel表格提取）====================

            63:[117.0,116.3,115.7,115.0,114.3,113.7,113.0,112.3,111.7,111.0,110.3,109.7],
            64:[109.0,108.3,107.7,107.0,106.3,105.7,105.0,104.3,103.7,103.0,102.3,101.7],
            65:[101.0,100.3,99.7,99.0,98.3,97.7,97.0,96.3,95.7,95.0,94.3,93.7],
            66:[93.0,92.3,91.5,90.8,90.0,89.3,88.5,87.8,87.0,86.3,85.5,84.8],
            67:[84.0,83.3,82.5,81.8,81.0,80.3,79.5,78.8,78.0,77.3,76.5,75.8],
            68:[75.0,74.2,73.3,72.5,71.7,70.8,70.0,69.2,68.3,67.5,66.7,65.8],
            69:[65.0,64.3,63.5,62.8,62.0,61.3,60.5,59.8,59.0,58.3,57.5,56.8],
            70:[56.0,null,null,null,null,null,null,null,null,null,null,null]
        };
        
        // 全局数据
        var parsedData = { pensionData: [], lastYearData: null, lastYearIndex: 0 };
        var retireInfo = { normal: {}, delayed: {} };
        
        // ==================== 正确的延迟退休计算 ====================
        // 公式：
        // 男性（原60岁→延迟至63岁）：60 + [((出生年份-1965)×12 + 出生月份] ÷ 4
        // 原55岁女职工（延迟至58岁）：55 + [((出生年份-1970)×12 + 出生月份] ÷ 4  
        // 原50岁女职工（延迟至55岁）：50 + [((出生年份-1975)×12 + 出生月份] ÷ 2
        // 月份不足1整月按1个月计（向上取整）
        
        function calculateRetireOptions() {
            var birthMonth = document.getElementById('birthMonth').value;
            var workerType = document.getElementById('workerType').value;
            
            if (!birthMonth || birthMonth.length !== 6) return;
            
            var birthYear = parseInt(birthMonth.substring(0, 4));
            var birthMon = parseInt(birthMonth.substring(4, 6));
            
            // 基础退休年龄和基准年份
            var baseAge, baseYear, divisor;
            if (workerType === 'male') {
                baseAge = 60;
                baseYear = 1965;
                divisor = 4;
            } else if (workerType === 'female55') {
                baseAge = 55;
                baseYear = 1970;
                divisor = 4;
            } else { // female50
                baseAge = 50;
                baseYear = 1975;
                divisor = 2;
            }
            
            // 法定退休日期（不延迟）
            var normalYear = birthYear + baseAge;
            var normalMonth = birthMon;
            var normalMonths = getPensionMonths(baseAge, 0);
            
            retireInfo.normal = { year: normalYear, month: normalMonth, months: normalMonths };
            document.getElementById('normalDate').textContent = normalYear + '-' + String(normalMonth).padStart(2,'0');
            document.getElementById('normalMonths').textContent = normalMonths;
            
            // 计算延迟月数 = ceil(((出生年份-基准年份)×12 + 出生月份) ÷ 除数)
            // 注意：出生月份从1开始计算
            var monthsDiff = (birthYear - baseYear) * 12 + birthMon;
            var delayMonths = Math.ceil(monthsDiff / divisor);
            
            // 计算延迟后的退休年龄（总月数）
            var totalAgeMonths = baseAge * 12 + delayMonths;
            var delayedAgeYears = Math.floor(totalAgeMonths / 12);
            var delayedAgeMonths = totalAgeMonths % 12;
            
            // 计算延迟后的退休日期 = 出生日期 + 延迟后的年龄
            // 出生日期转月份：年份×12 + 月份
            var birthTotalMonths = birthYear * 12 + birthMon;
            var retireTotalMonths = birthTotalMonths + delayedAgeYears * 12 + delayedAgeMonths;
            var delayedYear = Math.floor(retireTotalMonths / 12);
            var delayedMonth = retireTotalMonths % 12;
            
            // 获取计发月数
            var delayedPensionMonths = getPensionMonths(delayedAgeYears, delayedAgeMonths);
            
            retireInfo.delayed = { 
                year: delayedYear, 
                month: delayedMonth, 
                months: delayedPensionMonths,
                delayMonths: delayMonths,
                delayedAge: delayedAgeYears + '岁' + delayedAgeMonths + '个月'
            };
            
            document.getElementById('delayedDate').textContent = delayedYear + '-' + String(delayedMonth).padStart(2,'0');
            document.getElementById('delayedMonths').textContent = delayedPensionMonths;
        }
        
        document.getElementById('birthMonth').onchange = calculateRetireOptions;
        document.getElementById('workerType').onchange = calculateRetireOptions;
        
        // ==================== 解析PDF ====================
        document.getElementById('parseBtn').onclick = function() {
            var text = document.getElementById('pdfText').value.trim();
            if (!text) { showError('请先复制PDF文本'); return; }
            
            try {
                var cleanText = text.replace(/(\d+)\.\s+(\d+)/g, '$1.$2').replace(/,/g, '').replace(/\s+/g, ' ').trim();
                
                // 提取：年份、上年社平、月缴费基数、累计储存额（最后一列）
                var pattern = /(\d{4})\s+([\d\.]+)\s+([\d\.]+)\s+([\d\.]+)\s+([\d\.]+)\s+([\d\.]+)\s+([\d\.]+)\s+([\d\.]+)\s+([\d\.]+)\s+([\d\.]+)\s+/g;
                
                var data = [];
                var match;
                while ((match = pattern.exec(cleanText)) !== null) {
                    var year = parseInt(match[1]);
                    var wage = parseFloat(match[2]) || 0;
                    var base = parseFloat(match[3]) || 0;
                    // 累计储存额是第9列(match[9])
                    var total = parseFloat(match[9]) || 0;
                    
                    if (year >= 1990 && year <= 2030 && (wage > 0 || base > 0)) {
                        data.push({year: year, wage: wage, base: base, total: total});
                    }
                }
                
                var yearMap = {};
                var uniqueData = [];
                data.forEach(function(item) {
                    if (!yearMap[item.year]) {
                        yearMap[item.year] = true;
                        uniqueData.push(item);
                    }
                });
                uniqueData.sort(function(a, b) { return a.year - b.year; });
                
                if (uniqueData.length === 0) throw new Error('未解析到数据');
                
                // 指数 = 3列 / 2列 = 月缴费基数 / 上年社平
                var calcData = uniqueData.map(function(item) {
                    var index = item.wage > 0 ? (item.base / item.wage) : 0;
                    return {year: item.year, wage: item.wage, base: item.base, total: item.total, index: index};
                });
                
                var lastData = calcData[calcData.length - 1];
                parsedData.pensionData = calcData;
                parsedData.lastYearData = lastData;
                parsedData.lastYearIndex = lastData.index;
                
                // 显示
                document.getElementById('startYear').textContent = calcData[0].year;
                document.getElementById('endYear').textContent = calcData[calcData.length - 1].year;
                document.getElementById('avgIndex').textContent = parsedData.lastYearIndex.toFixed(4);
                document.getElementById('accountBalance').textContent = lastData.total.toFixed(0);
                
                // 表格
                var tableHtml = '';
                // 保存完整数据供展开/收起使用
                window.pensionTableData = calcData;
                window.tableExpanded = false;
                
                // 默认只显示第一行和最后一行
                var displayData = [];
                if (calcData.length > 2) {
                    displayData = [calcData[0], calcData[calcData.length - 1]];
                } else {
                    displayData = calcData;
                }
                
                displayData.forEach(function(item) {
                    tableHtml += '<tr><td>'+item.year+'</td><td>'+item.wage.toFixed(2)+'</td><td>'+item.base.toFixed(2)+'</td><td>'+item.index.toFixed(4)+'</td><td>'+item.total.toFixed(2)+'</td></tr>';
                });
                document.getElementById('dataTable').innerHTML = tableHtml;
                
                // 更新展开按钮文字
                var toggleBtn = document.getElementById('toggleTableBtn');
                if (toggleBtn) {
                    toggleBtn.textContent = calcData.length > 2 ? '展开全部 (' + calcData.length + '条)' : '收起';
                }
                
                document.getElementById('resultSection').style.display = 'block';
                hideError();
                
                // 初始化展开按钮状态
                window.tableExpanded = false;
                
            } catch (err) {
                showError('解析失败：' + err.message);
            }
        };
        
        // ==================== 展开/收起表格 ====================
        document.getElementById('toggleTableBtn').onclick = function() {
            var tableBody = document.getElementById('dataTable');
            var toggleBtn = document.getElementById('toggleTableBtn');
            var data = window.pensionTableData || [];
            
            window.tableExpanded = !window.tableExpanded;
            
            if (window.tableExpanded) {
                // 展开全部
                var tableHtml = '';
                data.forEach(function(item) {
                    tableHtml += '<tr><td>'+item.year+'</td><td>'+item.wage.toFixed(2)+'</td><td>'+item.base.toFixed(2)+'</td><td>'+item.index.toFixed(4)+'</td><td>'+item.total.toFixed(2)+'</td></tr>';
                });
                tableBody.innerHTML = tableHtml;
                toggleBtn.textContent = '收起';
            } else {
                // 只显示第一行和最后一行
                var tableHtml = '';
                if (data.length > 2) {
                    tableHtml += '<tr><td>'+data[0].year+'</td><td>'+data[0].wage.toFixed(2)+'</td><td>'+data[0].base.toFixed(2)+'</td><td>'+data[0].index.toFixed(4)+'</td><td>'+data[0].total.toFixed(2)+'</td></tr>';
                    tableHtml += '<tr><td>'+data[data.length-1].year+'</td><td>'+data[data.length-1].wage.toFixed(2)+'</td><td>'+data[data.length-1].base.toFixed(2)+'</td><td>'+data[data.length-1].index.toFixed(4)+'</td><td>'+data[data.length-1].total.toFixed(2)+'</td></tr>';
                } else {
                    data.forEach(function(item) {
                        tableHtml += '<tr><td>'+item.year+'</td><td>'+item.wage.toFixed(2)+'</td><td>'+item.base.toFixed(2)+'</td><td>'+item.index.toFixed(4)+'</td><td>'+item.total.toFixed(2)+'</td></tr>';
                    });
                }
                tableBody.innerHTML = tableHtml;
                toggleBtn.textContent = '展开全部 (' + data.length + '条)';
            }
        };
        
        // ==================== 重置全部 ====================
        document.getElementById('resetBtn').onclick = function() {
            // 清空所有输入框
            document.getElementById('birthMonth').value = '';
            document.getElementById('workStartMonth').value = '';
            document.getElementById('accountStartMonth').value = '199601';
            document.getElementById('currentYear').value = '2026';
            document.getElementById('currentBase').value = '';
            document.getElementById('baseGrowthRate').value = '3';
            document.getElementById('wageGrowthRate').value = '3';
            document.getElementById('pdfText').value = '';
            
            // 隐藏结果显示区域
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('finalResult').style.display = 'none';
            
            // 清空解析数据
            parsedData = { pensionData: [], lastYearData: null, lastYearIndex: 0 };
            retireInfo = { normal: {}, delayed: {} };
            
            // 重置退休信息显示
            document.getElementById('normalDate').textContent = '-';
            document.getElementById('normalMonths').textContent = '-';
            document.getElementById('delayedDate').textContent = '-';
            document.getElementById('delayedMonths').textContent = '-';
            
            // 清空数据明细
            document.getElementById('startYear').textContent = '-';
            document.getElementById('endYear').textContent = '-';
            document.getElementById('avgIndex').textContent = '-';
            document.getElementById('accountBalance').textContent = '-';
            
            // 隐藏错误
            hideError();
        };
        
        // ==================== 图例按钮 ====================
        document.getElementById('legendBtn').onclick = function() {
            document.getElementById('legendModal').style.display = 'flex';
        };
        
        // ==================== 计算退休金 ====================
        document.getElementById('calcBtn').onclick = function() {
            try {
                var birthMonth = document.getElementById('birthMonth').value;
                var baseGrowthRate = parseFloat(document.getElementById('baseGrowthRate').value) || 0;
                var wageGrowthRate = parseFloat(document.getElementById('wageGrowthRate').value) || 0;
                var currentBase = parseFloat(document.getElementById('currentBase').value) || 0;
                var accountStartMonth = document.getElementById('accountStartMonth').value;
                
                if (!birthMonth) throw new Error('请输入出生年月');
                if (!currentBase) throw new Error('请输入当前计发基数');
                var workStartMonthCheck = document.getElementById('workStartMonth').value;
                if (!workStartMonthCheck) throw new Error('请输入参加工作日期');
                
                // 使用延迟退休日期
                var retireYear = retireInfo.delayed.year;
                var retireMonth = retireInfo.delayed.month;
                var pensionMonths = retireInfo.delayed.months;
                
                // 计算缴费年限和视同缴费年限
                var workStartMonth = document.getElementById('workStartMonth').value;
                var workStartYear = workStartMonth ? parseInt(workStartMonth.substring(0,4)) : 1996;
                var workStartMon = workStartMonth ? parseInt(workStartMonth.substring(4,6)) : 1;
                var accountYear = accountStartMonth ? parseInt(accountStartMonth.substring(0,4)) : 1996;
                var accountMon = accountStartMonth ? parseInt(accountStartMonth.substring(4,6)) : 1;
                // 199601视为199512来处理视同缴费
                if (accountYear === 1996 && accountMon === 1) {
                    accountYear = 1995;
                    accountMon = 12;
                }
                var birthYear = parseInt(birthMonth.substring(0,4));
                
                // 视同缴费年限 = 建账年份 - 参加工作年份（精确到月，保留两位小数）
                // 计算月份差：先算年份差，再处理月份借位
                var yearDiffAsPension = accountYear - workStartYear;
                var monthDiffAsPension = accountMon - workStartMon;
                if (monthDiffAsPension < 0) {
                    yearDiffAsPension -= 1;
                    monthDiffAsPension += 12;
                }
                var yearsAsPension = yearDiffAsPension + monthDiffAsPension / 12;
                yearsAsPension = Math.max(0, yearsAsPension);
                
                // 总缴费年限 = 退休年份 - 参加工作年份（精确到月，保留两位小数）
                var yearDiffTotal = retireYear - workStartYear;
                var monthDiffTotal = retireMonth - workStartMon;
                if (monthDiffTotal < 0) {
                    yearDiffTotal -= 1;
                    monthDiffTotal += 12;
                }
                var totalYears = yearDiffTotal + monthDiffTotal / 12;
                totalYears = Math.max(0, totalYears);
                
                // 最后一年数据
                var lastData = parsedData.lastYearData;
                var lastIndex = parsedData.lastYearIndex;
                var currentYearData = lastData.year;
                
                // ===== 1. 计算个人账户储存额 =====
                // X=最后数据年, A=上年平均工资, B=月平均缴费基数, C=指数, D=累计储存额(第9列，X-1年末的累计)
                var X = currentYearData;
                var A = lastData.wage;
                var B = lastData.base;
                var C = lastIndex;
                var D = lastData.total;  // 这是X-1年末的累计储存额
                
                // D是X-1年末的累计，需要加上X年(最后一年)的个人缴纳部分
                var lastYearPay = B * 0.08 * 12;
                var accountBalance = D + lastYearPay;
                
                // 预测未来年份：从X+1年到退休年Y
                var futureBase = B;
                for (var year = X + 1; year <= retireYear; year++) {
                    // 当年月平均缴费基数 = 上年平均工资 * (1+增长率) * 指数
                    futureBase = A * (1 + wageGrowthRate / 100) * C;
                    // 更新上年平均工资
                    A = A * (1 + wageGrowthRate / 100);
                    // 计算个人缴纳部分
                    var months = (year === retireYear) ? retireMonth : 12;
                    var personalPay = futureBase * 0.08 * months;
                    accountBalance += personalPay;
                }
                
                // ===== 2. 计算平均指数 =====
                // 计算从建账年份到退休年份的平均指数（包括预测的未来年份）
                var sumKnownIndex = 0;
                parsedData.pensionData.forEach(function(item) { sumKnownIndex += item.index; });
                var knownYears = parsedData.pensionData.length;
                var futureYears = retireYear - currentYearData;
                var totalYearsForIndex = knownYears + futureYears;
                var totalIndex = sumKnownIndex + (lastIndex * futureYears);
                var finalAvgIndex = totalIndex / totalYearsForIndex;
                
                // ===== 3. 计算计发基数 =====
                // 退休年份是Y，则用(Y-1)年的计发基数
                // currentBase是当前年份的基数，需要增长到退休前一年
                var inputCurrentYear = parseInt(document.getElementById('currentYear').value) || 2026;
                var yearsToRetire = retireYear - inputCurrentYear;
                var finalBase = currentBase;
                for (var y = 0; y < yearsToRetire; y++) {
                    finalBase = finalBase * (1 + baseGrowthRate / 100);
                }
                
                // ===== 4. 计算退休金 =====
                var indexedWage = finalBase * finalAvgIndex;
                var basePension = (finalBase + indexedWage) / 2 * totalYears * 0.01;
                var personalPension = accountBalance / pensionMonths;
                var transitionPension = indexedWage * yearsAsPension * 0.012;
                // 调节金：职工建立个人账户前的视同缴费年限满15年及以上者，每人每月发给15元
                var adjustmentPension = yearsAsPension >= 15 ? 15 : 0;
                var total = basePension + personalPension + transitionPension + adjustmentPension;
                
                // 显示结果
                document.getElementById('basicPension').textContent = '¥' + basePension.toFixed(2);
                document.getElementById('personalPension').textContent = '¥' + personalPension.toFixed(2);
                document.getElementById('transitionPension').textContent = '¥' + transitionPension.toFixed(2);
                document.getElementById('adjustmentPension').textContent = '¥' + adjustmentPension.toFixed(2);
                document.getElementById('totalPension').textContent = '¥' + total.toFixed(2);
                
                // 显示更多明细
                document.getElementById('totalYears').textContent = totalYears.toFixed(2) + '年';
                document.getElementById('yearsAsPension').textContent = yearsAsPension.toFixed(2) + '年';
                document.getElementById('finalAvgIndex').textContent = finalAvgIndex.toFixed(4);
                document.getElementById('finalAccount').textContent = '¥' + accountBalance.toFixed(0);
                document.getElementById('finalBase').textContent = '¥' + finalBase.toFixed(0);
                document.getElementById('retireYear').textContent = retireYear + '年';
                
                document.getElementById('finalResult').style.display = 'block';
                document.getElementById('finalResult').scrollIntoView({behavior: 'smooth'});
                
            } catch (err) {
                showError(err.message);
            }
        };
        
        function getPensionMonths(age, months) {
            if (age < 40) age = 40;
            if (age > 70) age = 70;
            var monthKey = Math.min(11, Math.max(0, months));
            var arr = monthTable[age];
            return arr && arr[monthKey] !== null ? arr[monthKey] : arr[0];
        }
        
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
